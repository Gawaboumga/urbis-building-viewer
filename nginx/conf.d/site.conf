# HTTP → HTTPS + ACME challenge
server {
    listen 80;
    server_name ${DNS_NAME} www.${DNS_NAME};

    location /.well-known/acme-challenge/ {
        root /var/www/frontend;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name my-building.brussels www.my-building.brussels;

    ssl_certificate /etc/letsencrypt/live/my-building.brussels/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my-building.brussels/privkey.pem;

    # Serve frontend
    root /var/www/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy backend
    location /api/ {
        proxy_pass http://urbis_backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
